version: "3.9"

services:
  backend:
    image: ghcr.io/upendra062/ai-database-chat/backend:${IMAGE_TAG:-latest}
    container_name: ai-chat-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    image: ghcr.io/upendra062/ai-database-chat/frontend:${IMAGE_TAG:-latest}
    container_name: ai-chat-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    container_name: ai-chat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  logs:

networks:
  default:
    name: ai-chat-prod-network
