name: Deploy — Development

on:
  push:
    branches: [development]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-database-chat

jobs:
  build-and-push:
    name: Build & Push Dev Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (dev)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend (dev)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:dev
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.DEV_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: development
      url: ${{ secrets.DEV_APP_URL }}

    steps:
      - name: Deploy to Railway (Development)
        # Set RAILWAY_TOKEN in GitHub Secrets
        # Install Railway CLI: https://docs.railway.app/develop/cli
        run: |
          echo "Deploying to development environment..."
          # Uncomment after setting up Railway:
          # npm install -g @railway/cli
          # railway up --service backend --environment development
          # railway up --service frontend --environment development
          echo "Deploy step ready — configure RAILWAY_TOKEN secret to activate"

      - name: Health check
        run: |
          echo "Health check URL: ${{ secrets.DEV_API_URL }}/health"
          # curl -f ${{ secrets.DEV_API_URL }}/health || exit 1

      - name: Notify deployment
        run: echo "✓ Development deployment complete — ${{ github.sha }}"
