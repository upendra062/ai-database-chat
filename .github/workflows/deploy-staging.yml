name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-database-chat

jobs:
  build-and-push:
    name: Build & Push Staging Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend (staging)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:staging
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging (QA)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: ${{ secrets.STAGING_APP_URL }}

    steps:
      - name: Deploy to Railway (Staging)
        run: |
          echo "Deploying to staging environment..."
          # Uncomment after setting up Railway:
          # npm install -g @railway/cli
          # railway up --service backend --environment staging
          # railway up --service frontend --environment staging
          echo "Deploy step ready — configure RAILWAY_TOKEN secret to activate"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f ${{ secrets.STAGING_API_URL }}/health || exit 1
          echo "Smoke tests passed ✓"

      - name: Notify deployment
        run: echo "✓ Staging deployment complete — ${{ github.sha }}"
