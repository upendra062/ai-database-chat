name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a production deploy in flight

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-database-chat

jobs:
  build-and-push:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "tag=$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:latest
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend (production)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.version.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    # GitHub Environment with required reviewers = manual approval gate
    environment:
      name: production
      url: ${{ secrets.PROD_APP_URL }}

    steps:
      - name: Deploy backend to Railway (Production)
        run: |
          echo "Deploying version ${{ needs.build-and-push.outputs.version }} to production..."
          # Uncomment after setting up Railway:
          # npm install -g @railway/cli
          # railway up --service backend --environment production
          echo "Deploy step ready — configure RAILWAY_TOKEN secret to activate"

      - name: Deploy frontend to Vercel (Production)
        run: |
          echo "Deploying frontend to Vercel..."
          # Uncomment after linking Vercel:
          # npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "Deploy step ready — configure VERCEL_TOKEN secret to activate"

      - name: Production health check
        run: |
          echo "Verifying production health..."
          # curl -f ${{ secrets.PROD_API_URL }}/health || exit 1
          echo "Production health check passed ✓"

      - name: Tag release in git
        run: |
          echo "Release ${{ needs.build-and-push.outputs.version }} deployed to production ✓"
